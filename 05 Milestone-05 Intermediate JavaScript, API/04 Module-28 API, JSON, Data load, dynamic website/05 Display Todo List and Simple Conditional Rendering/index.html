<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Todo List and Simple Conditional Rendering</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 30px 20px;
      }

      #title {
        text-align: center;
        color: white;
        font-size: 3rem;
        margin-bottom: 40px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        letter-spacing: 2px;
        position: relative;
      }

      #title::after {
        content: "📋";
        margin-left: 15px;
        font-size: 2.5rem;
      }

      #todo-container {
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .todo-card {
        background: white;
        padding: 20px 25px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        gap: 20px;
        transition: all 0.3s ease;
        animation: slideIn 0.5s ease;
        border-left: 5px solid #667eea;
      }

      .todo-card:hover {
        transform: translateX(10px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      }

      .todo-card p {
        font-size: 1.5rem;
        min-width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Completed tasks styling */
      .todo-card p:contains("true") {
        color: #10b981;
      }

      .todo-card p:contains("false") {
        color: #ef4444;
      }

      .todo-card h4 {
        font-size: 1.1rem;
        color: #333;
        flex: 1;
        text-transform: capitalize;
      }

      /* Add icons based on completed status */
      .todo-card p::before {
        font-size: 1.5rem;
      }

      .todo-card p:contains("true")::before {
        content: "✅";
        margin-right: 10px;
      }

      .todo-card p:contains("false")::before {
        content: "⭕";
        margin-right: 10px;
      }

      /* Animation for cards */
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Loading state */
      #todo-container:empty::before {
        content: "Loading todos... 📥";
        display: block;
        text-align: center;
        color: white;
        font-size: 1.5rem;
        padding: 40px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        backdrop-filter: blur(5px);
      }

      /* Responsive design */
      @media (max-width: 600px) {
        #title {
          font-size: 2.2rem;
        }

        #title::after {
          font-size: 1.8rem;
        }

        .todo-card {
          padding: 15px 20px;
          gap: 15px;
        }

        .todo-card h4 {
          font-size: 0.95rem;
        }

        .todo-card p {
          font-size: 1.2rem;
        }
      }

      @media (max-width: 400px) {
        #title {
          font-size: 1.8rem;
        }

        .todo-card {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }

        .todo-card p {
          margin-bottom: 5px;
        }
      }
    </style>
  </head>
  <body>
    <h1 id="title">All todo</h1>
    <section id="todo-container"></section>

    <script src="script.js"></script>
  </body>
</html>
